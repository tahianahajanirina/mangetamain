name: Full Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_training:
        description: 'Skip ML training (use existing models)'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Tests
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run tests
      run: |
        pytest tests/ -v --tb=short
    
    - name: Run linting
      run: |
        ruff check src/ scripts/ config/ --output-format=github
        black --check src/ scripts/ config/ tests/

  # Job 2: ML Training
  ml-training:
    name: Train ML Models
    needs: tests
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_training != 'true'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[sentiment]"
    
    - name: Setup Kaggle credentials
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      run: |
        mkdir -p ~/.kaggle
        echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json
    
    - name: Download Kaggle dataset
      run: |
        python scripts/download_kaggle_data.py
    
    - name: Run ML Pipeline
      run: |
        echo "🧹 Step 1: Cleaning data..."
        python scripts/clean_data.py
        
        echo "🍳 Step 2: Recipe pipeline..."
        python scripts/run_recipe_pipeline.py
        
        echo "🥗 Step 3: Nutrition classification..."
        python scripts/run_nutrition_pipeline.py
        
        echo "🏷️ Step 4: Nutrition tagging..."
        python main_nutrition_tagging.py
        
        echo "⏱️ Step 5: Time prediction..."
        python main_time_prediction.py
        
        echo "😊 Step 6: Sentiment analysis..."
        python train_sentiment_model.py
    
    - name: Verify models
      run: |
        echo "📦 Generated models:"
        ls -lhR outputs/models/
        ls -lhR outputs/sentiment_model/
    
    - name: Upload trained models as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-models
        path: |
          outputs/models/**/*
          outputs/sentiment_model/**/*
        retention-days: 30

  # Job 3: Build Docker (Models downloaded at runtime from HF)
  build-docker:
    name: Build Docker Image
    needs: [tests]
    runs-on: ubuntu-latest
    if: always() && (needs.tests.result == 'success')
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    # NOTE: Models are NOT included in the image
    # They will be downloaded from Hugging Face Hub at runtime
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix={{branch}}-
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.streamlit
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Generate deployment instructions
      run: |
        echo "## 🚀 Deployment Ready!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Docker Image Published:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### To deploy locally:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
        echo "docker run -p 8501:8501 -e HF_MODEL_REPO=username/repo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Environment Variables Needed:" >> $GITHUB_STEP_SUMMARY
        echo "- \`HF_MODEL_REPO\`: Your Hugging Face model repository" >> $GITHUB_STEP_SUMMARY
        echo "  (e.g., tahianahajanirina/mangetamain-models)" >> $GITHUB_STEP_SUMMARY
